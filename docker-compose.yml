version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: apartment_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apartment_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: apartment_backend
    restart: unless-stopped
    environment:
      DEBUG: "True"
      SECRET_KEY: "change-me-in-production-very-secret-key-1234567890"
      DB_NAME: apartment_rental
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      ACCESS_TOKEN_LIFETIME_MINUTES: 30
      REFRESH_TOKEN_LIFETIME_DAYS: 7
      MEDIA_ROOT: /app/media
      MEDIA_URL: /uploads/
      SMS_PROVIDER: mock
    volumes:
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput || true &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 60 config.wsgi:application"

volumes:
  postgres_data:
